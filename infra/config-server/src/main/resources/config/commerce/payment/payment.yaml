spring:
  jpa:
    database: POSTGRESQL
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: payment_schema
  sql:
    init:
      mode: always
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5437/payment-db
    username: postgres
    password: ${DB_PASSWORD:shareit}

server:
  port: 0

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.jdbc.datasource.init: DEBUG

feign:
  client:
    config:
      order:
        connectTimeout: 5000
        readTimeout: 5000
      shopping-store:
        connectTimeout: 5000
        readTimeout: 5000

eureka:
  instance:
    instance-id: ${spring.application.name}:${random.value}
    prefer-ip-address: true