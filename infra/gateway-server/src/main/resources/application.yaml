server:
  port: 8080

spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      routes:
        - id: shopping-store
          uri: lb://SHOPPING-STORE
          predicates:
            - Path=/api/v1/shopping-store/**
        - id: shopping-cart
          uri: lb://SHOPPING-CART
          predicates:
            - Path=/api/v1/shopping-cart/**
        - id: warehouse
          uri: lb://WAREHOUSE
          predicates:
            - Path=/api/v1/warehouse/**


eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: gateway,health,info
  endpoint:
    gateway:
      access: read-only
